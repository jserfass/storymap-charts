<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criteria Weight Distribution</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #fff; padding: 20px; }
  .legend { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 18px; font-size: 13px; color: #555; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .legend .dot { width: 12px; height: 12px; border-radius: 2px; }
  .chart-container { position: relative; width: 100%; height: 480px; }
</style>
</head>
<body>
<div class="legend">
  <span><span class="dot" style="background:#1D9E75"></span>Landscape & recreation</span>
  <span><span class="dot" style="background:#378ADD"></span>Livability</span>
  <span><span class="dot" style="background:#888780"></span>Minor</span>
</div>
<div class="chart-container">
  <canvas id="weightChart"></canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const labels = [
  'Mountains (local relief)',
  'Trail running & hiking',
  'Wilderness',
  'Population density',
  'Skiing',
  'Gravel biking',
  'Cost of living',
  'Crime',
  'GIS jobs',
  'Economic environment',
  'Concerts'
];
const weights = [5, 5, 5, 4, 3, 3, 3, 3, 2, 2, 1];
const totalWeight = weights.reduce((a, b) => a + b, 0);
const pcts = weights.map(w => ((w / totalWeight) * 100).toFixed(1));
const colors = [
  '#1D9E75', '#1D9E75', '#1D9E75',
  '#378ADD',
  '#1D9E75', '#1D9E75',
  '#378ADD', '#378ADD',
  '#378ADD',
  '#378ADD',
  '#888780'
];

new Chart(document.getElementById('weightChart'), {
  type: 'bar',
  data: {
    labels: labels,
    datasets: [{
      data: weights,
      backgroundColor: colors,
      borderRadius: 4,
      barThickness: 28
    }]
  },
  options: {
    indexAxis: 'y',
    responsive: true,
    maintainAspectRatio: false,
    layout: { padding: { right: 60 } },
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: (ctx) => 'Weight: ' + ctx.raw + '  (' + pcts[ctx.dataIndex] + '%)'
        }
      }
    },
    scales: {
      x: {
        beginAtZero: true,
        max: 6,
        ticks: { stepSize: 1, color: '#555', font: { size: 12 } },
        grid: { color: 'rgba(0,0,0,0.06)' },
        title: { display: true, text: 'Weight (multiplier)', color: '#555', font: { size: 13 } }
      },
      y: {
        ticks: { color: '#333', font: { size: 13 } },
        grid: { display: false }
      }
    }
  },
  plugins: [{
    id: 'pctLabels',
    afterDatasetsDraw(chart) {
      const ctx = chart.ctx;
      const meta = chart.getDatasetMeta(0);
      ctx.font = '12px sans-serif';
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.textBaseline = 'middle';
      meta.data.forEach((bar, i) => {
        ctx.fillText(pcts[i] + '%', bar.x + 8, bar.y);
      });
    }
  }]
});
</script>
</body>
</html>
